<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADIXO TOP UP - Premium Gaming Credit Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Orbitron:wght@400..900&family=Oxanium:wght@200..800&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #09090b;
        color: #fafafa;
        font-family: 'Chakra Petch', sans-serif;
      }
      h1, h2, h3, .gaming-font {
        font-family: 'Oxanium', sans-serif;
      }
      .logo-font {
        font-family: 'Orbitron', sans-serif;
      }
      .glass-card {
        background: rgba(24, 24, 27, 0.8);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(63, 63, 70, 0.5);
      }
      .game-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.3);
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #09090b;
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3f3f46;
      }
      ::selection {
        background: #f97316;
        color: white;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <!-- Vite entry point -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
