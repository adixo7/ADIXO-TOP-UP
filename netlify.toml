[build]
  publish = "dist"
  command = "npm ci && ./node_modules/.bin/vite build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "nft"

[[redirects]]
  from = "/api/site-control"
  to = "/.netlify/functions/site-control"
  status = 200

[[redirects]]
  from = "/api/order/:id"
  to = "/.netlify/functions/order-status?id=:id"
  status = 200

[[redirects]]
  from = "/api/order"
  to = "/.netlify/functions/order"
  status = 200

[[redirects]]
  from = "/api/telegram-webhook"
  to = "/.netlify/functions/telegram-webhook"
  status = 200

[[redirects]]
  from = "/api/setup-webhook"
  to = "/.netlify/functions/setup-webhook"
  status = 200

[[redirects]]
  from = "/api/debug-storage"
  to = "/.netlify/functions/debug-storage"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
